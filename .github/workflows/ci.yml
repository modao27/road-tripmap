# CI — lint + tests sur chaque push et pull request.
# Aucun build : le déploiement GitHub Pages sert les fichiers tels quels,
# ce workflow ne fait que garder la porte (ESLint + Vitest).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests (Vitest)
        run: npm test
