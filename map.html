<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirection — Road Trip Map</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script>
    // Compatibilité des anciens liens : map.html?map=<uuid|slug>[&onboard=true]
    // La carte vit désormais dans la SPA (index.html) :
    //   UUID → #/roadtrips/:id · slug partagé → #/map/:slug · rien → #/map
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var map     = params.get('map');
      var onboard = params.get('onboard') === 'true' ? '?onboard=true' : '';
      var isUUID  = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(map || '');
      var route   = !map ? '#/map'
        : isUUID  ? '#/roadtrips/' + map
        : '#/map/' + encodeURIComponent(map);
      window.location.replace('index.html' + onboard + route);
    })();
  </script>
</head>
<body>
  <p>Redirection… <a href="index.html#/map">Ouvrir la carte</a></p>
</body>
</html>
