<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mes Road Trips</title>
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

  <div class="home-wrap">

    <header class="home-header">
      <div>
        <p class="home-eyebrow">Outdoor Jura</p>
        <h1 class="home-title">Mes Road Trips</h1>
      </div>
      <button class="btn-primary" id="btnNew" type="button">＋ Nouveau road trip</button>
    </header>

    <main class="trip-grid" id="tripGrid" aria-label="Liste des road trips"></main>

    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-icon">🗺️</div>
      <h2>Aucun road trip pour l'instant</h2>
      <p>Crée ton premier road trip pour commencer à explorer le Jura.</p>
      <button class="btn-primary" id="btnNewEmpty" type="button">Créer mon premier road trip</button>
    </div>

  </div>

  <!-- Modale nouveau road trip -->
  <div class="modal-backdrop" id="newTripBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="newTripHeading">
      <h2 id="newTripHeading">Nouveau road trip</h2>
      <label class="modal-field">
        Titre
        <input type="text" id="newTripName" placeholder="Ex : Road trip Jura juin 2025" maxlength="80">
      </label>
      <label class="modal-field">
        Description <span class="optional">(facultatif)</span>
        <textarea id="newTripDesc" placeholder="Région, saison, thème…" rows="3"></textarea>
      </label>
      <div class="modal-actions">
        <button class="btn-secondary" id="btnCancelNew" type="button">Annuler</button>
        <button class="btn-primary"   id="btnConfirmNew" type="button">Créer</button>
      </div>
    </div>
  </div>

  <!-- Modale confirmation suppression -->
  <div class="modal-backdrop" id="deleteTripBackdrop" hidden>
    <div class="modal modal--sm" role="dialog" aria-modal="true">
      <h2>Supprimer ce road trip ?</h2>
      <p class="modal-warning">Tous les pins et l'itinéraire associés seront définitivement supprimés.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="btnCancelDelete" type="button">Annuler</button>
        <button class="btn-danger"    id="btnConfirmDelete" type="button">Supprimer</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
