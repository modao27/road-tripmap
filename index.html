<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Road Trip Map</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1f5f43">
  <link rel="preconnect" href="https://unpkg.com">
  <script>
    // Anti-flash : applique le thème mémorisé avant le premier rendu
    // (voir src/shared/utils/theme.js — même clé, lecture brute ici
    // pour rester synchrone et sans dépendance).
    try {
      var t = localStorage.getItem('rtm-theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <!-- Leaflet + markercluster + css/style.css : chargés à la demande par
       MapPage — le dashboard et l'auth ne paient pas la carte -->
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <!-- Librairies globales chargées avant les modules ES -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.1/dist/umd/supabase.js"
          integrity="sha384-cP+QrKcaFzs7aIG1IzHGLKC5cjjlA05fYF2E7C0hqeDvsLKzwgYAS1cYhsDQB+L1" crossorigin="anonymous"></script>
  <script type="module" src="src/app/main.js"></script>
</body>
</html>
